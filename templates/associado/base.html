{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SindApp</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=7">
    <link rel="icon" type="image/x-icon" href="{% static 'Assets/favicon.ico' %}?v=7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <header class="topo-principal">
        <div class="container nav-wrap">
            <a href="{% url 'index' %}" class="logo-link">
                <div class="logo-box">
                    <img src="{% static 'Assets/logo_sem_fundo.png' %}?v=7" class="logo" alt="Logo SindApp">
                </div>
            </a>

            <nav class="menu">
                <a href="{% url 'index' %}"><i class="fa-solid fa-house"></i> Início</a>
                <a href="{% url 'perfil' %}"><i class="fa-solid fa-user"></i> Perfil</a>
                <a href="{% url 'carteirinha' %}"><i class="fa-solid fa-id-card"></i> Carteirinha</a>
                <a href="{% url 'beneficio' %}"><i class="fa-solid fa-gift"></i> Benefícios</a>
                <a href="{% url 'contato' %}"><i class="fa-solid fa-envelope"></i> Contato</a>
            </nav>
        </div>
    </header>

    <main class="main-area">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    {% include 'associado/partials/_footer.html' %}

</body>
</html>
