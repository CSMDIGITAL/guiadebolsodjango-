{% extends 'associado/base.html' %}

{% block content %}
<style>
    .form-page{
        max-width:900px;
        margin:0 auto;
        background:#fff;
        padding:32px;
        border-radius:24px;
        box-shadow:0 12px 30px rgba(15,23,42,0.08);
    }

    .form-page h1{
        margin-bottom:24px;
        color:#0d4d8b;
    }

    form p{
        display:grid;
        gap:8px;
        margin-bottom:18px;
    }

    input, select, textarea{
        width:100%;
        padding:14px;
        border:1px solid #d1d5db;
        border-radius:12px;
        font-size:15px;
    }

    .btn-salvar{
        background:#0d4d8b;
        color:#fff;
        border:none;
        padding:14px 22px;
        border-radius:12px;
        cursor:pointer;
        font-weight:700;
    }
</style>

<div class="form-page">
    <h1>{{ titulo }}</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-salvar">Salvar</button>
    </form>
</div>
{% endblock %}
